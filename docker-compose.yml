services:
  # ─── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: neuron-postgres
    environment:
      POSTGRES_USER: neuron
      POSTGRES_PASSWORD: neuronpass
      POSTGRES_DB: neuronagent
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U neuron -d neuronagent"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: neuron-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Backend (FastAPI) ─────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: neuron-backend
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://neuron:neuronpass@postgres:5432/neuronagent
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/venv  # exclude venv from bind mount
    restart: unless-stopped

  # ─── Frontend (Next.js) ────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: neuron-frontend
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules  # exclude node_modules from bind mount
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
